<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Practica de Clase de Github</title>
    <style>
        /* Austin - CSS boton saludar */
        body { font-family: sans-serif; display: flex; justify-content: center;
        align-items: center; height: 100vh; background: #f0f2f5; transition: 0.3s; }
        .card { background: white; padding: 2rem; border-radius: 10px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; text-align: center; }
        input { width: 90%; padding: 10px; margin: 10px 0;
        border: 1px solid #ccc; border-radius: 5px; }
        button { background: #007bff; color: white; border: none;
        padding: 10px 20px; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #0056b3; }
        #mensaje { margin-top: 15px; font-weight: bold; }

        /* Josvy - CSS modo oscuro */
        #btnDarkMode { background: #343a40; margin-top: 10px; }
        #btnDarkMode:hover { background: #23272b; }
        body.dark { background: #121212; }
        body.dark .card { background: #1e1e1e; color: #f0f0f0;
        box-shadow: 0 4px 6px rgba(255,255,255,0.1); }
        body.dark input { background: #2c2c2c; color: #f0f0f0; border-color: #555; }
        body.dark #btnDarkMode { background: #f0f0f0; color: #121212; }
        body.dark #btnDarkMode:hover { background: #cccccc; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Bienvenido</h2>
        <p>Ingresa tu nombre para continuar</p>
        <input type="text" id="nombreUsuario" placeholder="Escribe tu nombre...">
        <button id="btnSaludar">Saludar</button>
        <div id="mensaje"></div>
        <button id="btnDarkMode">Modo Oscuro</button>
    </div>

    <script>
        /* Rosibeth - JavaScript saludar */
        document.getElementById('btnSaludar')
          .addEventListener('click', function() {
            const nombre = document.getElementById('nombreUsuario').value;
            const display = document.getElementById('mensaje');
            if (nombre.trim() === "") {
                display.innerText = "Por favor, escribe algo.";
                display.style.color = "red";
            } else {
                display.innerText = "Hola, " + nombre + "! Exito en tu practica de Git.";
                display.style.color = "green";
            }
        });

        /* Josvy - JavaScript modo oscuro */
        document.getElementById('btnDarkMode')
          .addEventListener('click', function() {
            document.body.classList.toggle('dark');
            this.innerText = document.body.classList.contains('dark')
                ? 'Modo Claro' : 'Modo Oscuro';
        });
    </script>
</body>
</html>
