<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Practica de Clase de Github</title>
  <style>
body { font-family: sans-serif; display: flex; justify-content: center; alignitems: center; height: 100vh; background: #f0f2f5; }

6px rgba(0,0,0,0.1); width: 300px; text-align: center; }
input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc;

button { background: #007bff; color: white; border: none; padding: 10px 20px;
border-radius: 5px; cursor: pointer; transition: 0.3s; }
button:hover { background: #0056b3; }
#mensaje { margin-top: 15px; font-weight: bold; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Bienvenido</h2>
    <p>Ingresa tu nombre para continuar</p>
    <input type="text" id="nombreUsuario" placeholder="Escribe tu nombre...">
    <button id="btnSaludar">Saludar</button>
    <div id="mensaje"></div>
  </div>
  <script>

  </script>
</body>
</html>
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Proyecto Web</title>

    <style>
        #btnDarkMode {
            background: #343a40;
            margin-top: 10px;
            padding: 10px;
            color: white;
            border: none;
            cursor: pointer;
        }
        #btnDarkMode:hover { background: #23272b; }

        body.dark { background: #121212; }

        body.dark .card {
            background: #1e1e1e;
            color: #f0f0f0;
            box-shadow: 0 4px 6px rgba(255,255,255,0.1);
        }

        body.dark input {
            background: #2c2c2c;
            color: #f0f0f0;
            border-color: #555;
        }

        body.dark #btnDarkMode {
            background: #f0f0f0;
            color: #121212;
        }

        body.dark #btnDarkMode:hover { background: #cccccc; }
    </style>
</head>

<body>

    <h1>Proyecto Web</h1>

    <div class="card">
        <p>Contenido de prueba</p>
        <input type="text" placeholder="Escribe algo">
    </div>

    <button id="btnDarkMode">Modo Oscuro</button>

    <script>
    document.getElementById('btnDarkMode')
      .addEventListener('click', function() {
        document.body.classList.toggle('dark');
        this.innerText =
          document.body.classList.contains('dark')
            ? 'Modo Claro' : 'Modo Oscuro';
    });
    </script>

</body>
</html>
