/* === JavaScript — Funcionalidad del botón Saludar === */
/* Agregar dentro del bloque <script> en el HTML */
document.getElementById('btnSaludar')
  .addEventListener('click', function() {
    const nombre =
      document.getElementById('nombreUsuario').value;
    const display =
      document.getElementById('mensaje');
    if (nombre.trim() === "") {
        display.innerText = "Por favor, escribe algo.";
        display.style.color = "red";
    } else {
        display.innerText =
          "Hola, " + nombre +
          "! Exito en tu practica de Git.";
        display.style.color = "green";
    }
});
